# Agent Prompts Configuration
# Separates prompts from code for easier maintenance and reduced LLM costs
# Issue #328: YAML Optimization

# Agent System Prompts
agents:
  voter_agent:
    system_prompt: |
      You are a parameterizable trading decision agent using MACD+RSI voting.

      Current configuration:
      - MACD: {macd}
      - RSI: {rsi}
      - Thresholds: {thresholds}

      Your role:
      1. Parse requests for trading analysis
      2. Apply the configured MACD+RSI voting logic
      3. Return structured trading decisions

      Always return results in JSON format with action, confidence, and reasoning.

# Tool Descriptions for AutoGen LLM Tool Selection
tools:
  unified_market_data:
    name: "fetch_unified_market_data"
    description: "Fetch market data using unified cache system. Routes through cache adapter for consistent data management across Polygon and Alpha Vantage sources."

  vxx_volatility_data:
    name: "fetch_vxx_volatility_data"
    description: "Fetch VXX volatility data for market fear-based sentiment analysis. Returns VXX-based sentiment scores for V2 Market Fear sentiment agent."

  hierarchical_news:
    name: "fetch_hierarchical_news"
    description: "Fetch hierarchical adaptive news mix for V4 sentiment analysis. Provides balanced company-specific, sector ETF, and broad market news for intelligent sentiment reasoning."

  market_context:
    name: "fetch_market_context_data"
    description: |
      Fetch market context data (SPY/QQQ) for enhanced sentiment analysis.

      Provides broader market direction and tech sector sentiment to complement
      individual stock analysis. Designed for LLM reasoning about market conditions.

      Parameters:
      - date: Target date for analysis (YYYY-MM-DD)
      - symbols: Market symbols (default: ["SPY", "QQQ"])

      Returns market context including:
      - Daily price movements
      - Short-term trends
      - Market sentiment interpretation
      - Overall market direction summary

      Use this to understand if the broader market and tech sector are supportive
      of individual stock decisions.

# User Interface Templates
interface:
  llm_assistant:
    help_text: |
      ❓ I didn't understand that request.

      **Available Commands:**
        • `add [SYMBOL]` - Open a new position
        • `close [SYMBOL]` - Close a position
        • `adjust stop [SYMBOL]` - Adjust stop loss
        • `status` - Show portfolio status
        • `scan` - Scan for opportunities
        • `evaluate [SYMBOL]` - Evaluate a ticker

      **Examples:**
        • 'add TQQQ'
        • 'close all positions'
        • 'what's my portfolio status?'
        • 'scan for opportunities'
