# Trading Modes Configuration
# Issue #400: Trading Modes Configuration System
# Issue #414: Advanced Trailing Stop Automation (KILLER FEATURE)
#
# Each mode defines risk parameters that propagate to:
# - Position sizing (max_position_pct, max_position_value)
# - Stop management (stop_loss, trailing stop thresholds)
# - Profit targets (take_profit)
# - Portfolio limits (max_portfolio_pct, max_positions)
# - Advanced trailing stops (climb_rate, volatility_aware)

default_mode: moderate

modes:
  conservative:
    description: "Low risk, capital preservation focus"

    # Strategy watchlist (Issue #405)
    # Loads from config_defaults/watchlists/{watchlist_strategy}.yaml
    watchlist_strategy: balanced

    # Position sizing
    max_position_pct: 0.05      # 5% of portfolio per position
    max_position_value: 2500    # $2,500 max per position
    max_portfolio_pct: 0.10     # 10% max total exposure
    max_positions: 5            # Max 5 concurrent positions

    # Exit strategy
    stop_loss: 0.02             # 2% stop loss
    take_profit: 0.05           # 5% profit target

    # Trailing stops - Issue #414: Advanced Trailing Stop Automation
    trailing_stops:
      enabled: true
      progressive_enabled: true
      progressive_breakeven_pct: 0.02   # Move to breakeven at 2%
      progressive_lock_25_pct: 0.03     # Lock 25% gains at 3%
      progressive_trail_50_pct: 0.04    # Trail 50% at 4%+
      min_update_interval_seconds: 60
      # Issue #414: Advanced features (KILLER FEATURE)
      climb_rate: slow          # slow = conservative gain locking (20%/40%/60%)
      volatility_aware: true    # Adjust trail distance based on ATR
      atr_multiplier: 2.0       # Wider stops for conservative mode
      profit_zone_start_pct: 0.015  # 1.5% = enter profit zone earlier
      # Issue #414: Voter signal integration (KILLER FEATURE)
      voter_influenced: true    # Tighten stops when voters signal SELL
      voter_tighten_multiplier: 0.5   # More aggressive tightening (50% = 50% tighter)
      voter_min_confidence: 0.65      # Higher confidence threshold to trigger
      # Issue #414: Support/Resistance awareness
      sr_awareness_enabled: true      # Avoid placing stops at S/R levels
      sr_buffer_pct: 0.007            # Wider buffer (0.7%) for conservative

    # Risk metrics
    risk_per_trade: 0.01        # 1% account risk per trade
    min_confidence: 0.75        # Higher confidence threshold

    # Partial exits - Issue #248: Implement Partial Position Exits
    partial_exits:
      enabled: true
      targets: 2                # Number of exit targets
      split: [0.5, 0.5]         # 50/50 split
      target_1_pct: 0.04        # First exit at 4% profit
      target_2: trailing        # Second target uses trailing stop

  moderate:
    description: "Balanced risk/reward for steady growth"

    # Strategy watchlist (Issue #405)
    watchlist_strategy: momentum

    # Position sizing
    max_position_pct: 0.10      # 10% of portfolio per position
    max_position_value: 5000    # $5,000 max per position
    max_portfolio_pct: 0.20     # 20% max total exposure
    max_positions: 10           # Max 10 concurrent positions

    # Exit strategy
    stop_loss: 0.05             # 5% stop loss
    take_profit: 0.10           # 10% profit target

    # Trailing stops - Issue #414: Advanced Trailing Stop Automation
    trailing_stops:
      enabled: true
      progressive_enabled: true
      progressive_breakeven_pct: 0.02   # Move to breakeven at 2%
      progressive_lock_25_pct: 0.04     # Lock 25% gains at 4%
      progressive_trail_50_pct: 0.06    # Trail 50% at 6%+
      min_update_interval_seconds: 60
      # Issue #414: Advanced features (KILLER FEATURE)
      climb_rate: medium        # medium = balanced gain locking (25%/50%/75%)
      volatility_aware: true    # Adjust trail distance based on ATR
      atr_multiplier: 1.5       # Standard ATR multiplier
      profit_zone_start_pct: 0.02   # 2% = standard profit zone threshold
      # Issue #414: Voter signal integration (KILLER FEATURE)
      voter_influenced: true    # Tighten stops when voters signal SELL
      voter_tighten_multiplier: 0.6   # Standard tightening (60% = 40% tighter)
      voter_min_confidence: 0.60      # Standard confidence threshold
      # Issue #414: Support/Resistance awareness
      sr_awareness_enabled: true      # Avoid placing stops at S/R levels
      sr_buffer_pct: 0.005            # Standard buffer (0.5%)

    # Risk metrics
    risk_per_trade: 0.02        # 2% account risk per trade
    min_confidence: 0.65        # Standard confidence threshold

    # Partial exits - Issue #248: Implement Partial Position Exits
    partial_exits:
      enabled: true
      targets: 2                # Number of exit targets
      split: [0.5, 0.5]         # 50/50 split
      target_1_pct: 0.05        # First exit at 5% profit (moderate takes profits faster)
      target_2: trailing        # Second target uses trailing stop

  aggressive:
    description: "Higher risk for maximum growth potential"

    # Strategy watchlist (Issue #405)
    watchlist_strategy: wheel_strategy

    # Position sizing
    max_position_pct: 0.20      # 20% of portfolio per position
    max_position_value: 10000   # $10,000 max per position
    max_portfolio_pct: 0.40     # 40% max total exposure
    max_positions: 15           # Max 15 concurrent positions

    # Exit strategy
    stop_loss: 0.08             # 8% stop loss
    take_profit: 0.20           # 20% profit target

    # Trailing stops - Issue #414: Advanced Trailing Stop Automation
    trailing_stops:
      enabled: true
      progressive_enabled: true
      progressive_breakeven_pct: 0.03   # Move to breakeven at 3%
      progressive_lock_25_pct: 0.06     # Lock 25% gains at 6%
      progressive_trail_50_pct: 0.10    # Trail 50% at 10%+
      min_update_interval_seconds: 30   # Faster updates for aggressive
      # Issue #414: Advanced features (KILLER FEATURE)
      climb_rate: fast          # fast = aggressive gain locking (33%/60%/80%)
      volatility_aware: true    # Adjust trail distance based on ATR
      atr_multiplier: 1.0       # Tighter stops for aggressive mode
      profit_zone_start_pct: 0.025  # 2.5% = slightly higher threshold
      # Issue #414: Voter signal integration (KILLER FEATURE)
      voter_influenced: true    # Tighten stops when voters signal SELL
      voter_tighten_multiplier: 0.7   # Less aggressive tightening (70% = 30% tighter)
      voter_min_confidence: 0.55      # Lower confidence threshold (more tolerant)
      # Issue #414: Support/Resistance awareness
      sr_awareness_enabled: true      # Avoid placing stops at S/R levels
      sr_buffer_pct: 0.003            # Smaller buffer (0.3%) for aggressive

    # Risk metrics
    risk_per_trade: 0.03        # 3% account risk per trade
    min_confidence: 0.55        # Lower confidence threshold

    # Partial exits - Issue #248: Implement Partial Position Exits
    partial_exits:
      enabled: true
      targets: 2                # Number of exit targets
      split: [0.5, 0.5]         # 50/50 split
      target_1_pct: 0.06        # First exit at 6% profit (aggressive lets winners run)
      target_2: trailing        # Second target uses trailing stop

# Per-ticker overrides (Phase 2)
