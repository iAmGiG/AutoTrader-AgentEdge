# Trading Configuration
# Centralized configuration for all trading parameters
# Converted from JSON for better readability and consistency with other configs

strategy_parameters:
  # Timeframe for technical analysis (Issue #365)
  # Standard values: 5m, 15m, 30m, 1h, 4h, 1d, 1w, 1M
  # - 5m, 15m, 30m: Scalping/day trading
  # - 1h, 4h: Intraday swing trading
  # - 1d: Daily swing/position trading (validated default)
  # - 1w, 1M: Position/long-term trading
  timeframe: "1d"

  macd:
    fast: 13
    slow: 34
    signal: 8
    description: "Validated MACD parameters (13/34/8)"
    timeframe: null  # null = inherit from strategy_parameters.timeframe

  rsi:
    period: 14
    oversold: 30
    overbought: 70
    description: "Standard RSI with 30/70 levels"
    timeframe: null  # null = inherit from strategy_parameters.timeframe

  exits:
    balanced:
      take_profit: 0.08
      stop_loss: 0.05
      description: "Balanced 8% TP / 5% SL (Best EV)"
      expected_value_50wr: 0.015
      breakeven_win_rate: 0.385

    conservative:
      take_profit: 0.06
      stop_loss: 0.08
      description: "Conservative 6% TP / 8% SL (Needs high WR)"
      expected_value_50wr: -0.01
      breakeven_win_rate: 0.571

    aggressive:
      take_profit: 0.10
      stop_loss: 0.03
      description: "Aggressive 10% TP / 3% SL"
      expected_value_50wr: 0.035
      breakeven_win_rate: 0.231

    default: "balanced"

  position_sizing:
    mode: "fixed"
    size: 1.0
    description: "100% capital per trade (all-in)"

risk_management:
  max_position_pct: 0.15  # 15% max per position (warning threshold)
  max_position_value: 5000  # Max $5K per position
  max_portfolio_pct: 0.20  # 20% max portfolio exposure per position
  max_positions: 10  # Maximum concurrent positions
  risk_per_trade: 0.02  # 2% portfolio risk per trade
  min_confidence: 0.65  # Minimum confidence for trade execution
  risk_free_rate: 0.02  # 2% annual risk-free rate for Sharpe calculation

backtest_defaults:
  initial_capital: 10000
  commission: 0.001
  slippage: 0.001

validated_performance:
  macd_rsi_voting:
    sharpe_ratio: 0.856
    win_rate: 0.514
    annual_return: 0.1262
    max_drawdown: -0.101
    test_period: "2024 AAPL"
    note: "Simple system outperforms complex approaches"

  complex_percentile:
    sharpe_ratio: -1.260
    win_rate: 0.177
    note: "Failed complexity trap - DO NOT USE"

# Technical Indicator Confidence Calculations
# Issue #358: Externalize magic numbers from market_scanner.py
technical_indicators:
  rsi:
    # Multiplier for RSI strength calculation
    # Used in: (rsi_config.oversold - current_rsi) * strength_multiplier
    strength_multiplier: 3.33

  confidence_calculations:
    # Maximum confidence when multiple indicators agree
    max_consensus: 0.85

    # Boost added when indicators align
    consensus_boost: 0.15

    # Maximum confidence for single indicator
    max_single_indicator: 0.65

    # Boost for single strong indicator
    single_indicator_boost: 0.10

# Position Management - Trailing Stop Configuration
# Issue #358: Externalize trailing stop thresholds from trading_cycle.py
position_management:
  trailing_stop:
    # Profit thresholds and corresponding actions
    thresholds:
      - profit_pct: 0.02
        action: "hold"
        description: "Under 2% profit - no stop adjustment"

      - profit_pct: 0.04
        action: "hold"
        description: "2-4% profit - monitor but don't adjust"

      - profit_pct: 0.06
        action: "lock_partial"
        lock_percent: 0.25
        description: "4-6% profit - lock in 25% gains"

      - profit_pct: 1.0
        action: "trail_aggressive"
        trail_percent: 0.50
        description: "6%+ profit - trail with 50% of gains"

    # Minimum dollar move to update stop (prevents micro-adjustments)
    min_move_dollars: 0.01
