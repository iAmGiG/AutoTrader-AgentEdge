  current_settings: "Current settings:"

  prompts:
    choice: "Edit setting (1-5, 0 to save, q to cancel): "
    enabled: "Enable scheduler? (yes/no): "
    morning_time: "Morning routine time (HH:MM:SS): "
    evening_time: "Evening routine time (HH:MM:SS): "
    max_retries: "Max retries (1-10): "
    dry_run: "Enable dry run mode? (yes/no): "

  messages:
    cancelled: "Cancelled"
    saved: "Configuration saved!"
    reloading: "Reloading scheduler..."
    reloaded: "Scheduler reloaded"
    invalid_time: "Invalid time format. Use HH:MM:SS"
    invalid_retries: "Value must be between 1 and 10"
    invalid_number: "Invalid number"
    invalid_choice: "Invalid choice"

# ============================================================================
# SETUP WIZARD
# ============================================================================
setup:
  header: "Scheduler Setup Wizard"

  intro:
    title: "What does the scheduler do?"
    description: |
      The scheduler automatically runs trading routines at set times:
      - Morning routine: Pre-market check, prepare for trading day
      - Evening routine: End-of-day review, adjust stops

  step1:
    title: "How often should the scheduler run?"
    options:
      - "Twice daily (morning + evening) - RECOMMENDED"
      - "Morning only (pre-market)"
      - "Evening only (end-of-day)"
      - "Cancel setup"
    prompt: "Choice [1-4]: "

  step2_morning:
    title: "Morning routine time (default: 9:20 AM ET, 10 min before market)"
    hint: "Press Enter for default, or enter time like '9:00' or '09:30'"
    prompt: "Morning time: "
    invalid: "Invalid format, using default 9:20 AM"

  step3_evening:
    title: "Evening routine time (default: 3:50 PM ET, 10 min before close)"
    hint: "Press Enter for default, or enter time like '15:30' or '3:45'"
    prompt: "Evening time: "
    invalid: "Invalid format, using default 3:50 PM"

  summary:
    title: "Configuration Summary:"
    morning_enabled: "Morning routine: Enabled"
    morning_disabled: "Morning routine: Disabled"
    evening_enabled: "Evening routine: Enabled"
    evening_disabled: "Evening routine: Disabled"
    time_format: "Time: {time} ET"

  confirm:
    prompt: "Save this configuration? [yes/no]: "
    saved: "Configuration saved!"
    start_prompt: "Start scheduler now? [yes/no]: "
    cancelled: "Setup cancelled, configuration not saved"

