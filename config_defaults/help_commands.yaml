  details: "Change how trades are executed:\n\n  CONFIRM  - Ask for approval before each trade (default)\n\
    \  AUTO     - Execute trades automatically without approval\n  PAPER    - Simulate trades without\
    \ real money (testing)\n  DISABLED - Block all trading\n\n⚠️  WARNING: Switching from paper to auto/confirm\
    \ requires confirmation."
