# CLI Help Command Documentation
# Auto-generated from help_system.py _build_help_data()
# Format: command_name -> {category, description, usage, examples, aliases, tags, related, details}

morning-routine:
  category: Workflow
  description: Run morning market scan and analysis
  usage: morning-routine [symbols]
  examples:
  - morning-routine
  - morning-routine AAPL,MSFT,TSLA
  - morning-routine --approve-all
  aliases:
  - morning
  - scan
  tags:
  - workflow
  - scanning
  - analysis
  related:
  - approve
  - reject
  - monitor
  - evening-summary
  details: "Scans your watchlist for trading opportunities using technical analysis.\nShows buy/sell signals\
    \ with confidence levels.\nEnters approval mode if execution_mode is set to CONFIRM.\n\nOptions:\n\
    \  --approve-all    Auto-approve all pending trades\n  --paper          Run in paper trading mode\
    \ only"
approve:
  category: Workflow
  description: Approve a pending trade
  usage: approve SYMBOL | approve all
  examples:
  - approve AAPL
  - approve all
  aliases:
  - 'yes'
  - ok
  tags:
  - workflow
  - execution
  related:
  - reject
  - morning-routine
  - show orders
  details: 'Approves a pending trade for execution.

    After approval, the trade is executed using your current execution mode.


    Use ''approve all'' to approve all pending trades at once.'
reject:
  category: Workflow
  description: Reject a pending trade
  usage: reject SYMBOL | reject all
  examples:
  - reject MSFT
  - reject all
  aliases:
  - 'no'
  - skip
  tags:
  - workflow
  - execution
  related:
  - approve
  - morning-routine
  details: 'Rejects a pending trade without executing it.

    The signal is logged for analysis but not traded.


    Use ''reject all'' to reject all pending trades at once.'
monitor:
  category: Workflow
  description: Monitor active positions
  usage: monitor [--check-exits]
  examples:
  - monitor
  - monitor --check-exits
  aliases:
  - watch
  - positions
  tags:
  - workflow
  - monitoring
  related:
  - show portfolio
  - show positions
  - evening-summary
  details: "Continuously monitors your active trading positions.\nDisplays position updates, profit/loss,\
    \ and exit signals.\n\nOptions:\n  --check-exits    Check for exit signals on open positions\n  --interval\
    \ 5     Update every N minutes (default: 5)"
evening-summary:
  category: Workflow
  description: Generate end-of-day report
  usage: evening-summary [--save FILE]
  examples:
  - evening-summary
  - evening-summary --save report.txt
  aliases:
  - summary
  - report
  - eod
  tags:
  - workflow
  - reporting
  related:
  - morning-routine
  - show portfolio
  details: "Generates a comprehensive end-of-day report.\nIncludes trades executed, P&L, market insights,\
    \ and next steps.\n\nOptions:\n  --save FILE      Save report to file\n  --detailed       Include\
    \ detailed trade breakdown"
buy:
  category: Trading
  description: Place a manual buy order
  usage: buy SYMBOL QUANTITY [PRICE] | buy SYMBOL [at a pullback/breakout]
  examples:
  - buy AAPL 10
  - buy MSFT 5 $425.50
  - buy QQQ at a pullback
  - buy SPY on a dip
  - buy NVDA at a breakout
  aliases:
  - long
  tags:
  - trading
  - execution
  - timing
  related:
  - sell
  - show orders
  - cancel
  details: "Place a buy order for a specific symbol and quantity.\nIf price is not specified, uses current\
    \ market price.\nRespects risk management rules and position limits.\n\nNEW: Entry Timing Context\
    \ (Issue #344):\n  'at a pullback' or 'on a dip' - Entry 2.5% below current price\n  'at a breakout'\
    \ - Entry 1.5% above current price\n  'now' or immediate - Entry at current market price\n\nExecution\
    \ depends on current execution_mode:\n  CONFIRM - Asks for approval before executing\n  AUTO    -\
    \ Executes immediately\n  PAPER   - Simulates the trade without real money\n  DISABLED - Blocks all\
    \ trading"
sell:
  category: Trading
  description: Place a manual sell order
  usage: sell SYMBOL QUANTITY [PRICE]
  examples:
  - sell AAPL 10
  - sell MSFT 5 $427.00
  aliases:
  - close
  - exit
  tags:
  - trading
  - execution
  related:
  - buy
  - show orders
  - cancel
  details: 'Place a sell order to close a position.

    You can only sell if you own the position.

    If price is not specified, uses current market price.


    Note: To short sell (sell without owning), use ''short'' command.'
cancel:
  category: Trading
  description: Cancel pending or open orders
  usage: cancel ORDER_ID | cancel SYMBOL | cancel all
  examples:
  - cancel 12345
  - cancel AAPL
  - cancel all
  aliases:
  - delete
  - remove
  tags:
  - trading
  - order management
  related:
  - show orders
  - buy
  - sell
  details: "Cancel one or more pending orders.\n\nUsage:\n  cancel ORDER_ID  - Cancel specific order by\
    \ ID\n  cancel SYMBOL    - Cancel all orders for a symbol\n  cancel all       - Cancel all pending\
    \ orders (with confirmation)\n\nNote: Canceled orders are logged for record-keeping."
