  details: "Display status of active forward testing cycles.\n\nShows:\n  - Days completed (X/30)\n  -\
    \ Number of signals generated\n  - Open positions\n  - Current P&L\n  - Next milestone (week 1, 2,\
    \ 3, 4, or final)\n\nWithout TEST_NAME, shows all active tests."
