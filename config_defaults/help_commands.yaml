forward-test start:
  category: Testing
  description: Start a new 30-day forward test
  usage: forward-test start TEST_NAME [--capital AMOUNT]
  examples:
  - forward-test start production_validation_2025
  - forward-test start my_test --capital 10000
  aliases:
  - ftest start
  - test start
  tags:
  - testing
  - validation
  - forward-testing
  related:
  - forward-test report
  - forward-test status
  details: "Initialize a new 30-day forward testing validation cycle.\nForward testing validates trading\
    \ strategy performance before live deployment.\n\nThe test will:\n  - Track all signals generated\
    \ over 30 days\n  - Monitor trade outcomes and P&L\n  - Calculate performance metrics (Sharpe, win\
    \ rate, drawdown)\n  - Generate go/no-go recommendation after 30 days\n\nOptions:\n  --capital AMOUNT\
    \    Starting capital for test (default: $10,000)"
forward-test report:
  category: Testing
  description: Generate forward test reports
  usage: forward-test report TEST_NAME [--type {daily|weekly|final}]
  examples:
  - forward-test report production_validation_2025
  - forward-test report my_test --type daily
  - forward-test report my_test --type weekly --week 2
  aliases:
  - ftest report
  - test report
  tags:
  - testing
  - reporting
  related:
  - forward-test start
  - forward-test status
  details: "Generate performance reports for ongoing or completed forward tests.\n\nReport Types:\n  daily\
    \   - Daily summary of signals and trades\n  weekly  - Week 1-4 performance breakdown\n  final   -\
    \ 30-day validation report with go/no-go recommendation\n\nReports include:\n  - Sharpe ratio and\
    \ risk-adjusted returns\n  - Win rate and profit factor\n  - Maximum drawdown\n  - Trade-by-trade\
    \ breakdown"
forward-test status:
  category: Testing
  description: Show status of running forward tests
  usage: forward-test status [TEST_NAME]
  examples:
