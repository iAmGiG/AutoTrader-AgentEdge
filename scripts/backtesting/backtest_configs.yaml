# Extended period tests
extended_tests:
  # Full Year Tests
  - name: "2020 Full Year - SPY"
    symbol: "SPY"
    start: "2020-01-01"
    end: "2020-12-31"
    description: "Full COVID year performance"
  
  - name: "2022 Full Year - SPY"
    symbol: "SPY"
    start: "2022-01-01"
    end: "2022-12-31"
    description: "Bear market year"
  
  - name: "2023 Full Year - NVDA"
    symbol: "NVDA"
    start: "2023-01-01"
    end: "2023-12-31"
    description: "AI boom year"

  # Six Month Periods
  - name: "2021 H1 - AAPL"
    symbol: "AAPL"
    start: "2021-01-01"
    end: "2021-06-30"
    description: "First half 2021"
  
  - name: "2021 H2 - MSFT"
    symbol: "MSFT"
    start: "2021-07-01"
    end: "2021-12-31"
    description: "Second half 2021"

  # Recent Extended Periods
  - name: "2024 H1 - SPY"
    symbol: "SPY"
    start: "2024-01-01"
    end: "2024-06-30"
    description: "Recent 6-month period"
  
