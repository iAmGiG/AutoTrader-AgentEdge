    symbol: "AAPL"
    start: "2024-01-01"
    end: "2024-12-31"
    description: "Recent full year"

# Test suite configurations
test_suites:
  quick:
    tests: ["quick_tests"]
    timeout_minutes: 2
    parallel: false
    description: "Quick validation tests"
  
  comprehensive:
    tests: ["comprehensive_tests"]
    timeout_minutes: 5
    parallel: true
    max_parallel: 4
    description: "Market stress period tests"
  
  extended:
    tests: ["extended_tests"]
    timeout_minutes: 10
    parallel: true
    max_parallel: 2
    description: "Long duration tests"
  
  all:
    tests: ["quick_tests", "comprehensive_tests", "extended_tests"]
    timeout_minutes: 10
    parallel: true
    max_parallel: 4
    description: "Complete test suite"

# Default settings
defaults:
  output_dir: ".cache/backtests"
  log_level: "INFO"
  save_plots: true
  aggregate_on_completion: true