# Minimal setup.cfg for tools that don't support pyproject.toml
# All other configuration has been moved to pyproject.toml

[flake8]
# flake8 doesn't support pyproject.toml yet (as of 2025)
# All other tools (black, ruff, autopep8) read from pyproject.toml
ignore = E402
max-line-length = 100
exclude = .git,__pycache__,docs,build,dist,.venv,.cache,reports
per-file-ignores =
    scripts/*.py: E402