# Minimal setup.cfg for tools that don't support pyproject.toml
# Most configuration has been moved to pyproject.toml

[autopep8]
# autopep8 still reads from setup.cfg
ignore = E402
max-line-length = 100

[flake8]
# flake8 doesn't support pyproject.toml yet
ignore = E402
max-line-length = 100
exclude = .git,__pycache__,docs,build,dist,.venv,.cache,reports
per-file-ignores =
    scripts/*.py: E402